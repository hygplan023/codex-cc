# Codex 管理中心 —— 一键运行
# 用法：在本目录执行  docker compose up -d --build
# 然后浏览器访问  http://localhost:18765
services:
  codex-manager:
    build: .
    image: codex-manager:local
    container_name: codex-manager
    restart: unless-stopped
    ports:
      # 仅绑定到本机回环地址：避免把（挂载了 docker 套接字、无鉴权的）管理面板
      # 暴露到局域网。如需局域网访问，请自行改为 "18765:8080" 并自担风险。
      - "127.0.0.1:18765:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
      - PUBLIC_DIR=/app/artifacts/docker-manager/dist/public
      # 后端在容器内访问 Ollama 的主机名。Ollama 容器把 11434 端口发布到宿主机，
      # 本平台通过 host.docker.internal 经宿主机回环访问到它（Docker Desktop / Linux 均可）。
      # 如改用同一 compose 网络下的服务名，可设为对应服务名。
      - OLLAMA_HOST=host.docker.internal
    extra_hosts:
      # Linux 下 host.docker.internal 默认不解析，显式映射到宿主机网关。
      # Windows / macOS Docker Desktop 本就内置该解析，此行无害。
      - "host.docker.internal:host-gateway"
    volumes:
      # 挂载宿主机 Docker 套接字，使本平台可管理 Docker Desktop 中的容器/镜像/数据卷。
      # Windows Docker Desktop（Linux 容器）同样支持此路径。
      - /var/run/docker.sock:/var/run/docker.sock
